<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  * { margin: 0; box-sizing: border-box; }
  :root {
    --bg:#0e1116; --text:#e6edf3; --dim:#9aa7b4; --accent:#4076c6; --accent2:#5b8de0;
    --p3l:#4a9d5b; --p2l:#c2a14d; --p3w:#a44fb0; --p2w:#6f8fd6;
  }
  html,body { width:1200px; height:630px; }
  body {
    background:
      radial-gradient(1100px 600px at 78% 18%, rgba(64,118,198,.18), transparent 60%),
      linear-gradient(160deg, #11161d 0%, #0e1116 55%, #0b0e13 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    position:relative; overflow:hidden;
  }
  /* faint board grid in the corner */
  .grid {
    position:absolute; right:-60px; top:-60px; width:520px; height:520px;
    display:grid; grid-template-columns:repeat(8,1fr); gap:8px; transform:rotate(8deg);
    opacity:.10;
  }
  .grid span { background:#7e93ab; border-radius:8px; }
  .wrap { position:absolute; inset:0; display:flex; flex-direction:column;
          justify-content:center; padding:0 96px; gap:34px; }
  .tiles { display:flex; gap:16px; }
  .tile {
    width:96px; height:96px; border-radius:16px; background:var(--accent);
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:58px; position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
  }
  .tile .v { position:absolute; right:11px; bottom:6px; font-size:20px; font-weight:700; opacity:.92; }
  .tile.p3w{background:var(--p3w);} .tile.p2l{background:var(--p2l);}
  h1 { font-size:84px; letter-spacing:.5px; line-height:1; font-weight:800; }
  h1 .mk { color:var(--accent2); }
  p.tag { font-size:36px; color:var(--dim); font-weight:500; }
  .url { position:absolute; left:96px; bottom:54px; font-size:26px; color:var(--accent2); font-weight:600; }
</style></head>
<body>
  <div class="grid" id="grid"></div>
  <div class="wrap">
    <div class="tiles">
      <div class="tile p3w">W<span class="v">5</span></div>
      <div class="tile">O<span class="v">1</span></div>
      <div class="tile p2l">R<span class="v">1</span></div>
      <div class="tile">D<span class="v">2</span></div>
      <div class="tile">S<span class="v">1</span></div>
    </div>
    <h1>Crossplay <span class="mk">Helper</span></h1>
    <p class="tag">Snap a screenshot. Get the best play.</p>
  </div>
  <div class="url">stmorse.github.io/crossplay-helper</div>
  <script>
    const g=document.getElementById("grid");
    for(let i=0;i<64;i++){const s=document.createElement("span");g.appendChild(s);}
  </script>
</body></html>
